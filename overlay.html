<img id="card" style="width:250px; position:absolute; bottom:50px; right:50px;">

<script>
setInterval(async () => {
  const res = await fetch("https://twitch-efootball.onrender.com/card");
  const data = await res.json();
  if (data) document.getElementById("card").src = data.image;
}, 2000);
</script>
